---
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          uv sync
      - name: Run tests
        run: |
          uv run pytest -m "not integration"
      - name: Validate DVC
        run: |
          uv run dvc dag

---
